<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f6f7f9;
            overflow: hidden;
        }
        /* 全屏视频样式 */
        #video {
            display: none;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 99999;
            border: none;
            outline: none;
            background: black;
        }
        /* 验证面板居中 */
        .verify-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: white;
            padding: 50px 35px;
            border-radius: 16px;
            box-shadow: 0 0 35px rgba(0,0,0,0.12);
            z-index: 10;
        }
        .verify-box h2 {
            font-size: 22px;
            color: #1f2937;
            margin-bottom: 12px;
        }
        .verify-box p {
            color: #6b7280;
            margin-bottom: 30px;
        }
        #verifyBtn {
            padding: 16px 32px;
            background: #f22f46;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        #verifyBtn:hover {
            background: #d02035;
        }
    </style>
</head>

<body>
    <!-- 去掉了muted，保留playsinline适配手机 -->
    <video id="video" loop playsinline>
        <source src="1.mp4" type="video/mp4">
    </video>

    <div class="verify-box" id="check">
        <h2>🔒 Cloudflare 安全检测</h2>
        <p>请完成验证以继续访问</p>
        <button id="verifyBtn">点击此处进行验证</button>
    </div>

    <script>
        const btn = document.getElementById('verifyBtn');
        const check = document.getElementById('check');
        const video = document.getElementById('video');

        btn.addEventListener('click', async () => {
            check.style.display = 'none';
            video.style.display = 'block';
            
            // 点击后触发播放（符合浏览器自动播放规则，有声音）
            video.play();
            // 强制全屏
            try {
                await video.requestFullscreen();
            } catch(e) {
                console.log('全屏请求失败，已正常播放');
            }
        });
    </script>

</body>
</html>
