<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>安全检测</title>
    <style>
        body {
            background-color: #f6f7f9;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        .verify-box {
            text-align: center;
            background: white;
            padding: 50px 35px;
            border-radius: 16px;
            box-shadow: 0 0 35px rgba(0,0,0,0.1);
        }
        .verify-box h2 {
            font-size: 22px;
            margin-bottom: 12px;
            color: #1f2937;
        }
        .verify-box p {
            color: #6b7280;
            margin-bottom: 30px;
        }
        #verifyBtn {
            padding: 16px 32px;
            background: #f22f46;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #verifyBtn:hover {
            background: #d02035;
        }

        /* 视频样式完全和你参考代码一致 */
        #video {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <!-- 视频：和你参考代码写法完全一样 -->
    <video id="video"
           src="1.mp4"
           autoplay
           loop
           playsinline>
    </video>

    <!-- 验证按钮 -->
    <div class="verify-box" id="check">
        <h2>🔒 Cloudflare 安全检测</h2>
        <p>请完成验证以继续访问</p>
        <button id="verifyBtn">点击此处进行验证</button>
    </div>

    <script>
        const btn = document.getElementById('verifyBtn');
        const check = document.getElementById('check');
        const video = document.getElementById('video');

        btn.addEventListener('click', () => {
            check.style.display = 'none';
            video.style.display = 'block';
            video.play(); // 点击播放，有声音！
        });
    </script>

</body>
</html>
